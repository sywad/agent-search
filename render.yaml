services:
  - type: web
    name: agent-search
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class gevent --workers 2 --timeout 300 --bind 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # must be set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
